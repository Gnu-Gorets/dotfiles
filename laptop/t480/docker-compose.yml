version: '3.9'

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "8000:8000"
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    restart: always

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime-kuma
    volumes:
      - uptime-kuma:/app/data
    ports:
      - "3001:3001"
    restart: always

  public-transport-in-serbia:
    image: public-transport-in-serbia
    container_name: public-transport-in-serbia
    ports:
      - "3000:3000"
    restart: always

volumes:
  portainer_data:
  uptime-kuma:
